# ABOUTME: Wave -10: create all platform namespaces before anything else lands.
# ABOUTME: Sync failure here blocks the entire Deinopis tree by design.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    deinopis.io/layer: the-web
    app.kubernetes.io/part-of: deinopis
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/REPLACE_WITH_OWNER/deinopis-kubecon-2026.git
    targetRevision: main
    path: gitops/namespaces
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
