# ABOUTME: Wave 0: The Net — Kyverno ClusterPolicies and Falco rules.
# ABOUTME: Kyverno itself is wave -5; this app ships only the policy/rule content.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    burritbot.io/layer: the-net
    app.kubernetes.io/part-of: burritbot
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/REPLACE_WITH_OWNER/burritbot-kubecon-2026.git
    targetRevision: main
    path: deploy/security
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
