# ABOUTME: Namespace manifest for the burritbot platform; owned by the root app-of-apps.
# ABOUTME: Creates the seven namespaces that every other manifest assumes exists.
---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    burritbot.io/layer: the-web
    app.kubernetes.io/part-of: burritbot
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    burritbot.io/layer: the-eyes
    app.kubernetes.io/part-of: burritbot
---
apiVersion: v1
kind: Namespace
metadata:
  name: security
  labels:
    burritbot.io/layer: the-net
    app.kubernetes.io/part-of: burritbot
---
apiVersion: v1
kind: Namespace
metadata:
  name: burritbot-net
  labels:
    burritbot.io/layer: the-net
    app.kubernetes.io/part-of: burritbot
---
apiVersion: v1
kind: Namespace
metadata:
  name: burritbot-unguarded
  labels:
    burritbot.io/layer: application
    burritbot.io/guarded: "false"
    app.kubernetes.io/part-of: burritbot
---
apiVersion: v1
kind: Namespace
metadata:
  name: burritbot-guarded
  labels:
    burritbot.io/layer: application
    burritbot.io/guarded: "true"
    app.kubernetes.io/part-of: burritbot
---
apiVersion: v1
kind: Namespace
metadata:
  name: audience
  labels:
    burritbot.io/layer: application
    app.kubernetes.io/part-of: burritbot
