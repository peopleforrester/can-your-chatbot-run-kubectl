# ABOUTME: Helm values for the argo-cd chart install used to bootstrap ArgoCD itself.
# ABOUTME: Applied with `helm upgrade --install argocd argo/argo-cd -n argocd -f values.yaml`.
---
global:
  domain: argocd.burritbot.local

crds:
  install: true
  keep: true

configs:
  params:
    server.insecure: true
    application.namespaces: "argocd"
  cm:
    timeout.reconciliation: 60s
    kustomize.buildOptions: "--enable-helm"
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs

controller:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

server:
  replicas: 1
  service:
    type: ClusterIP
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

repoServer:
  replicas: 1
  metrics:
    enabled: true

applicationSet:
  enabled: true
  replicas: 1

notifications:
  enabled: false

dex:
  enabled: false

redis:
  enabled: true

redis-ha:
  enabled: false
