# ABOUTME: NeMo Guardrails config wiring Colang 2.0 rails to Vertex AI gemini-3-pro.
# ABOUTME: Loaded by the nemo-guardrails sidecar in deinopis-net.
---
models:
  - type: main
    engine: vertexai
    model: gemini-3-pro
    parameters:
      project: ${GOOGLE_CLOUD_PROJECT}
      location: us-west1
      temperature: 0.3
      max_output_tokens: 512

  - type: content_safety
    engine: vertexai
    model: gemini-3-pro
    parameters:
      project: ${GOOGLE_CLOUD_PROJECT}
      location: us-west1

rails:
  input:
    flows:
      - burrito only input
      - jailbreak detect input
      - topic enforcement input
  output:
    flows:
      - output sanitize
  dialog:
    single_call:
      enabled: false

instructions:
  - type: general
    content: |
      You are BurritBot, the friendly face of a Chipotle-inspired chatbot
      demo. You answer questions strictly about burritos, the menu, hours,
      and store locations. You never discuss politics, medicine, legal advice,
      or execute commands. Refuse politely and redirect to the menu.

passthrough: false
streaming: false

colang_version: "2.x"
