# ABOUTME: ClusterIP Service for the unguarded BurritBot — no ingress, cluster-internal only.
# ABOUTME: Audience frontend reaches this directly during Act 1.
---
apiVersion: v1
kind: Service
metadata:
  name: burritbot-unguarded
  namespace: burritbot-unguarded
  labels:
    app.kubernetes.io/name: burritbot
    app.kubernetes.io/part-of: burritbot
    burritbot.io/layer: application
    burritbot.io/guarded: "false"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: burritbot
    burritbot.io/guarded: "false"
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
