# ABOUTME: ServiceAccount for unguarded BurritBot — exists only so pods can schedule.
# ABOUTME: Deliberately no WIF annotation; the unguarded path is the "no protections" demo.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: burritbot
  namespace: burritbot-unguarded
  labels:
    app.kubernetes.io/name: burritbot
    app.kubernetes.io/part-of: burritbot
    burritbot.io/layer: application
    burritbot.io/guarded: "false"
automountServiceAccountToken: true
