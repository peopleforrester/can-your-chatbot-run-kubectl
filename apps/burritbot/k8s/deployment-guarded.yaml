# ABOUTME: Guarded BurritBot Deployment — traffic enters via the deinopis-net gateway.
# ABOUTME: Carries the full deinopis.io label set enforced by require-deinopis-labels.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: burritbot
  namespace: burritbot-guarded
  labels:
    app.kubernetes.io/name: burritbot
    app.kubernetes.io/part-of: deinopis
    deinopis.io/layer: application
    deinopis.io/guarded: "true"
    deinopis.io/model-source: "vertex-ai/gemini-2.5-flash"
    deinopis.io/model-hash: "sha256:deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: burritbot
      deinopis.io/guarded: "true"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: burritbot
        app.kubernetes.io/part-of: deinopis
        deinopis.io/layer: application
        deinopis.io/guarded: "true"
        deinopis.io/model-source: "vertex-ai/gemini-2.5-flash"
        deinopis.io/model-hash: "sha256:deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"
    spec:
      serviceAccountName: burritbot
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: burritbot
          image: us-west1-docker.pkg.dev/REPLACE_WITH_PROJECT/deinopis/burritbot:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MODEL_NAME
              value: gemini-2.5-flash
            - name: GOOGLE_CLOUD_PROJECT
              value: REPLACE_WITH_PROJECT
            - name: GOOGLE_CLOUD_LOCATION
              value: us-west1
            - name: BURRITBOT_GUARDED
              value: "true"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.monitoring.svc.cluster.local:4317
            - name: OTEL_SERVICE_NAME
              value: burritbot-guarded
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
