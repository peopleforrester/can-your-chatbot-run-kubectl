# ABOUTME: ServiceAccount for the audience-frontend FastAPI proxy in the audience namespace.
# ABOUTME: Token automount disabled — this pod never calls the Kubernetes API.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audience-frontend
  namespace: audience
  labels:
    app.kubernetes.io/name: audience-frontend
    app.kubernetes.io/part-of: burritbot
    burritbot.io/layer: application
automountServiceAccountToken: false
