# ABOUTME: Audience frontend Deployment — FastAPI proxy in the `audience` namespace.
# ABOUTME: BURRITBOT_TARGET env var is patched live by scripts/cast-net.sh.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audience-frontend
  namespace: audience
  labels:
    app.kubernetes.io/name: audience-frontend
    app.kubernetes.io/part-of: burritbot
    burritbot.io/layer: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: audience-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audience-frontend
        app.kubernetes.io/part-of: burritbot
        burritbot.io/layer: application
    spec:
      serviceAccountName: audience-frontend
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: audience-frontend
          image: us-west1-docker.pkg.dev/REPLACE_WITH_PROJECT/burritbot/audience-frontend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: BURRITBOT_TARGET
              value: burritbot-unguarded
            - name: BURRITBOT_UNGUARDED_URL
              value: http://burritbot-unguarded.burritbot-unguarded.svc.cluster.local:8080
            - name: BURRITBOT_GUARDED_URL
              value: http://burritbot-ai-gateway.burritbot-net.svc.cluster.local:8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
