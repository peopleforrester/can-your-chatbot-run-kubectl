# ABOUTME: ArgoCD sync target for both BurritBot deployments (unguarded + guarded).
# ABOUTME: References real manifests under apps/burritbot/k8s; do not duplicate yaml here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../apps/burritbot/k8s/deployment-unguarded.yaml
  - ../../apps/burritbot/k8s/deployment-guarded.yaml
  - ../../apps/burritbot/k8s/service-unguarded.yaml
  - ../../apps/burritbot/k8s/service-guarded.yaml
  - ../../apps/burritbot/k8s/serviceaccount-burritbot-unguarded.yaml
  - ../../apps/burritbot/k8s/serviceaccount-burritbot-guarded.yaml
