# ABOUTME: OTel Weaver registry declaring the gen_ai.* attributes BurritBot must emit.
# ABOUTME: Consumed by spinybacked-orbweaver to score trace/span conformance.
---
groups:
  - id: gen_ai
    type: attribute_group
    brief: "Generative AI call semantic conventions used by BurritBot + burritbot."
    prefix: gen_ai
    attributes:
      # Renamed in OTel semconv v1.37.0 — was `gen_ai.system` with value
      # `vertex_ai`; the canonical attribute is now `gen_ai.provider.name`
      # with Google Cloud values prefixed `gcp.*`.
      - id: gen_ai.provider.name
        type:
          allow_custom_values: false
          members:
            - id: gcp_vertex_ai
              value: "gcp.vertex_ai"
              brief: "Google Vertex AI (used by BurritBot)."
            - id: openai
              value: "openai"
              brief: "OpenAI API."
            - id: anthropic
              value: "anthropic"
              brief: "Anthropic API."
        requirement_level: required
        brief: "Name of the GenAI provider."

      - id: gen_ai.request.model
        type: string
        requirement_level: required
        brief: "Name of the model requested (e.g., gemini-3-pro)."

      - id: gen_ai.usage.input_tokens
        type: int
        requirement_level: required
        brief: "Number of input tokens consumed by the model call."

      - id: gen_ai.usage.output_tokens
        type: int
        requirement_level: required
        brief: "Number of output tokens returned by the model call."

  - id: burritbot
    type: attribute_group
    brief: "burritbot platform attributes layered on top of gen_ai.*"
    prefix: burritbot
    attributes:
      - id: burritbot.layer
        type:
          allow_custom_values: false
          members:
            - id: the_eyes
              value: "the-eyes"
              brief: "Observability layer."
            - id: the_net
              value: "the-net"
              brief: "Active guardrail layer."
            - id: the_web
              value: "the-web"
              brief: "Web/platform layer."
        requirement_level: recommended
        brief: "Which burritbot layer emitted this signal."

      - id: burritbot.guarded
        type: boolean
        requirement_level: recommended
        brief: "Whether the call path traverses The Net."
