# ABOUTME: Kyverno ClusterPolicy requiring the deinopis.io label set on guarded workloads.
# ABOUTME: Enforced in burritbot-guarded and deinopis-net; audit-only elsewhere.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-deinopis-labels
  annotations:
    policies.kyverno.io/title: Require Deinopis Labels
    policies.kyverno.io/category: Deinopis / The Net
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Every Pod in a guarded namespace must declare the full deinopis.io label
      set: layer, model-source, and model-hash. This is how the audit trail ties
      a running workload back to the model artifact it was approved against.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-deinopis-labels-on-guarded-pods
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - burritbot-guarded
                - deinopis-net
      validate:
        message: >-
          Pods in guarded namespaces must carry all deinopis.io/layer,
          deinopis.io/model-source, and deinopis.io/model-hash labels.
        cel:
          expressions:
            - expression: >-
                has(object.metadata.labels) &&
                has(object.metadata.labels['deinopis.io/layer']) &&
                has(object.metadata.labels['deinopis.io/model-source']) &&
                has(object.metadata.labels['deinopis.io/model-hash'])
              message: >-
                Missing one of deinopis.io/layer, deinopis.io/model-source, or
                deinopis.io/model-hash on the Pod metadata.
