# ABOUTME: Kyverno ClusterPolicy requiring the burritbot.io label set on guarded workloads.
# ABOUTME: Enforced in burritbot-guarded and burritbot-net; audit-only elsewhere.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-burritbot-labels
  annotations:
    policies.kyverno.io/title: Require burritbot Labels
    policies.kyverno.io/category: burritbot / The Net
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Every Pod in a guarded namespace must declare the full burritbot.io label
      set: layer, model-source, and model-hash. This is how the audit trail ties
      a running workload back to the model artifact it was approved against.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-burritbot-labels-on-guarded-pods
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - burritbot-guarded
                - burritbot-net
      validate:
        message: >-
          Pods in guarded namespaces must carry all burritbot.io/layer,
          burritbot.io/model-source, and burritbot.io/model-hash labels.
        cel:
          expressions:
            - expression: >-
                has(object.metadata.labels) &&
                has(object.metadata.labels['burritbot.io/layer']) &&
                has(object.metadata.labels['burritbot.io/model-source']) &&
                has(object.metadata.labels['burritbot.io/model-hash'])
              message: >-
                Missing one of burritbot.io/layer, burritbot.io/model-source, or
                burritbot.io/model-hash on the Pod metadata.
