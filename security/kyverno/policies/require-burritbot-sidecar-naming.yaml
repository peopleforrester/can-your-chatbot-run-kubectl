# ABOUTME: Kyverno ClusterPolicy requiring sidecar containers to be named burritbot-*.
# ABOUTME: Prevents stray injected sidecars from silently joining the guarded path.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-burritbot-sidecar-naming
  annotations:
    policies.kyverno.io/title: Require burritbot-* Sidecar Naming
    policies.kyverno.io/category: burritbot / The Net
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Any Pod in burritbot-guarded or burritbot-net that has more than one
      container must name every non-primary container with the `burritbot-`
      prefix. This makes it impossible to quietly attach an unblessed sidecar
      (proxy, logger, debug shell) to a guarded workload.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: sidecar-names-must-start-with-burritbot
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - burritbot-guarded
                - burritbot-net
      validate:
        message: >-
          Sidecar containers in guarded Pods must be named with the
          `burritbot-` prefix (e.g., burritbot-llm-guard, burritbot-envoy).
        cel:
          expressions:
            - expression: >-
                size(object.spec.containers) <= 1 ||
                object.spec.containers[1:].all(c, c.name.startsWith('burritbot-'))
              message: >-
                At least one non-primary container is missing the
                `burritbot-` name prefix.
